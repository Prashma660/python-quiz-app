<!DOCTYPE html>
<html>

<head>

    <title>Leaderboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <h1>Quiz Leaderboard</h1>

    {% if scores %}

    <table border="1" cellpadding="10">

        <tr>

            <th>Rank</th>
            <th>Name</th>
            <th>Score</th>

        </tr>

        {% for score in scores %}

        <tr>

            <td>{{ loop.index }}</td>

            <td>{{ score[0] }}</td>

            <td>{{ score[1] }}</td>

        </tr>

        {% endfor %}

    </table>

    {% else %}

    <h2>No scores available</h2>

    {% endif %}

</body>

</html>
